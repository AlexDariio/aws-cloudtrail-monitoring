AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudTrail + CloudWatch Security Monitoring'

Parameters:
  AlertEmail:
    Type: String
    Description: 'Email address for security alerts'

Resources:
  # ---- S3 Bucket for CloudTrail Logs ----
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::AccountId}-cloudtrail-logs'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:GetBucketAcl'
            Resource: !GetAtt CloudTrailBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub '${CloudTrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

  # ---- IAM Role for CloudTrail to write to CloudWatch ----
  CloudTrailCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudTrail-CloudWatch-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: CloudTrailToCloudWatch
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: '*'

  # ---- CloudWatch Log Group ----
  CloudTrailLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/cloudtrail/monitoring
      RetentionInDays: 30

  # ---- CloudTrail ----
  MonitoringTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: security-monitoring-trail
      IsLogging: true
      IsMultiRegionTrail: false
      S3BucketName: !Ref CloudTrailBucket
      CloudWatchLogsLogGroupArn: !GetAtt CloudTrailLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt CloudTrailCloudWatchRole.Arn
      EnableLogFileValidation: true
  # ---- Metric Filter: Unauthorized API Calls ----
  UnauthorizedApiCallsFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref CloudTrailLogGroup
      FilterPattern: '{ ($.errorCode = "*UnauthorizedAccess*") || ($.errorCode = "AccessDenied*") }'
      MetricTransformations:
        - MetricNamespace: CloudTrailMetrics
          MetricName: UnauthorizedApiCallCount
          MetricValue: '1'

  # ---- Metric Filter: Root Account Usage ----
  RootAccountUsageFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref CloudTrailLogGroup
      FilterPattern: '{ ($.userIdentity.type = "Root") && ($.userIdentity.invokedBy NOT EXISTS) && ($.eventType != "AwsServiceEvent") }'
      MetricTransformations:
        - MetricNamespace: CloudTrailMetrics
          MetricName: RootAccountUsageCount
          MetricValue: '1'

  # ---- Metric Filter: Console Login Without MFA ----
  NoMfaConsoleLoginFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref CloudTrailLogGroup
      FilterPattern: '{ ($.eventName = "ConsoleLogin") && ($.additionalEventData.MFAUsed != "Yes") }'
      MetricTransformations:
        - MetricNamespace: CloudTrailMetrics
          MetricName: NoMfaConsoleLoginCount
          MetricValue: '1'

  # ---- SNS Topic for Alerts ----
  SecurityAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: security-alerts
      DisplayName: AWS Security Alerts

  SecurityAlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SecurityAlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ---- Alarm: Unauthorized API Calls ----
  UnauthorizedApiCallsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: Unauthorized-API-Calls
      AlarmDescription: 'Alert when unauthorized API calls are detected'
      Namespace: CloudTrailMetrics
      MetricName: UnauthorizedApiCallCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SecurityAlertTopic

  # ---- Alarm: Root Account Usage ----
  RootAccountUsageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: Root-Account-Usage
      AlarmDescription: 'Alert when root account is used'
      Namespace: CloudTrailMetrics
      MetricName: RootAccountUsageCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SecurityAlertTopic

  # ---- Alarm: Console Login Without MFA ----
  NoMfaConsoleLoginAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: No-MFA-Console-Login
      AlarmDescription: 'Alert when console login without MFA is detected'
      Namespace: CloudTrailMetrics
      MetricName: NoMfaConsoleLoginCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SecurityAlertTopic

  # ---- CloudWatch Dashboard ----
  SecurityDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: Security-Monitoring-Dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 8, "height": 6,
              "properties": {
                "title": "Unauthorized API Calls",
                "metrics": [["CloudTrailMetrics", "UnauthorizedApiCallCount", { "stat": "Sum", "period": 300 }]],
                "region": "${AWS::Region}",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 8, "y": 0, "width": 8, "height": 6,
              "properties": {
                "title": "Root Account Usage",
                "metrics": [["CloudTrailMetrics", "RootAccountUsageCount", { "stat": "Sum", "period": 300 }]],
                "region": "${AWS::Region}",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 16, "y": 0, "width": 8, "height": 6,
              "properties": {
                "title": "Console Login Without MFA",
                "metrics": [["CloudTrailMetrics", "NoMfaConsoleLoginCount", { "stat": "Sum", "period": 300 }]],
                "region": "${AWS::Region}",
                "view": "timeSeries"
              }
            },
            {
              "type": "alarm",
              "x": 0, "y": 6, "width": 24, "height": 3,
              "properties": {
                "title": "Security Alarm Status",
                "alarms": [
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:Unauthorized-API-Calls",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:Root-Account-Usage",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:No-MFA-Console-Login"
                ]
              }
            }
          ]
        }


Outputs:
  CloudTrailBucketName:
    Value: !Ref CloudTrailBucket
    Description: 'S3 bucket storing CloudTrail logs'
  CloudTrailArn:
    Value: !GetAtt MonitoringTrail.Arn
    Description: 'CloudTrail trail ARN'
  LogGroupName:
    Value: !Ref CloudTrailLogGroup
    Description: 'CloudWatch Log Group for CloudTrail'
  SNSTopicArn:
    Value: !Ref SecurityAlertTopic
    Description: 'SNS topic for security alerts'
